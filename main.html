<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customizable Tab Website</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="./assets/style.css">
    <script>
        // Example: basic script to simulate log in/out and update user info
        document.addEventListener("DOMContentLoaded", function() {
            const userActions = document.getElementById('user-actions');
            let userName = null;

            function renderUserActions() {
                if (userName) {
                    userActions.innerHTML = `
                        <span>Welcome, <strong>${userName}</strong></span>
                        <button id="logout-btn">Logout</button>
                    `;
                    document.getElementById('logout-btn').onclick = function() {
                        userName = null;
                        renderUserActions();
                    }
                } else {
                    userActions.innerHTML = `
                        <button id="login-btn">Login</button>
                        <button id="signup-btn">Sign Up</button>
                    `;
                    document.getElementById('login-btn').onclick = function() {
                        userName = "DemoUser";
                        renderUserActions();
                    }
                    document.getElementById('signup-btn').onclick = function() {
                        userName = "NewUser";
                        renderUserActions();
                    }
                }
            }

            renderUserActions();
        });
    </script>
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-img">
                <!-- Replace below with your logo SVG or IMG -->
                <span style="font-size:24px;">🌟</span>
            </div>
            <span>BrandName</span>
        </div>
        <nav class="tabs">
            <ul>
                <li class="active"><a href="#">Home</a></li>
                <li><a href="#">Features</a></li>
                <li><a href="#">Pricing</a></li>
                <li><a href="#">About</a></li>
            </ul>
        </nav>
        <div class="user-actions" id="user-actions"></div>
    </header>
    <main>
        <!-- Main content goes here -->
    </main>
    <footer>
        &copy; 2024 BrandName. All rights reserved.
    </footer>
</body>
</html>
